<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AI Solar System Learning App
</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<h1>AI Solar System Learning App</h1>
<div class="info">

<h2>
AI Powered 3D Solar System
</h2>

<p>
Explore planets with interactive 3D animation,
AI explanations, and quizzes.
</p>

</div>
<div class="buttons">

<button onclick="showPlanet('sun')">
Sun
</button>

<button onclick="showPlanet('mercury')">
Mercury
</button>

<button onclick="showPlanet('venus')">
Venus
</button>

<button onclick="showPlanet('earth')">
Earth
</button>

<button onclick="showPlanet('mars')">
Mars
</button>

<button onclick="showPlanet('jupiter')">
Jupiter
</button>

<button onclick="showPlanet('saturn')">
Saturn
</button>

<button onclick="showPlanet('uranus')">
Uranus
</button>

<button onclick="showPlanet('neptune')">
Neptune
</button>

<button onclick="showPlanet('pluto')">
Pluto
</button>

</div>

<div id="scene-container"></div>

<div class="info">

<h2 id="planet-title">
Planet
</h2>

<p id="planet-info">
Planet Information
</p>

</div>

<div class="quiz">

<h2>Quiz</h2>

<p id="question"></p>

<button onclick="checkAnswer(0)">
Option 1
</button>

<button onclick="checkAnswer(1)">
Option 2
</button>

<p id="result"></p>

</div>

<script src="script.js"></script>

</body>

</html>
